name: progressors_learning

services:
  postgres:
    image: postgres:16-alpine
    container_name: progressors_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-progressors}
      POSTGRES_USER: ${POSTGRES_USER:-progressors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-progressors}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-progressors} -d ${POSTGRES_DB:-progressors}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: progressors_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-progressors}:${POSTGRES_PASSWORD:-progressors}@postgres:5432/${POSTGRES_DB:-progressors}
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      API_LLM: ${API_LLM:-http://host.docker.internal:8080/dump}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-https://api.telegram.org}
      PROMPT_FILE_PATH: /app/INSTUC.txt
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  huggingface_cache:
