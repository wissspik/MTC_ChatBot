name: progressors_learning

services:
  postgres:
    image: postgres:16-alpine
    container_name: progressors_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-progressors}
      POSTGRES_USER: ${POSTGRES_USER:-progressors}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-progressors}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-progressors} -d ${POSTGRES_DB:-progressors}"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        INSTALL_LOCAL_LLM: ${INSTALL_LOCAL_LLM:-false}
    container_name: progressors_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-progressors}:${POSTGRES_PASSWORD:-progressors}@postgres:5432/${POSTGRES_DB:-progressors}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash-lite}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_JSON_MODE: ${LLM_JSON_MODE:-true}
      OLLAMA_FALLBACK_ENABLED: ${OLLAMA_FALLBACK_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-600}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-8192}
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      API_LLM: ${API_LLM:-http://host.docker.internal:8080/dump}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_BASE: ${TELEGRAM_API_BASE:-https://api.telegram.org}
      PROMPT_FILE_PATH: /app/INSTUC.txt
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8080}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-https?://(localhost|127\.0\.0\.1)(:\d+)?}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - huggingface_cache:/app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  huggingface_cache:
